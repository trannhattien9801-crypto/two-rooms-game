<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
}

.player{
background:#222;
margin:10px;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Host</h1>

<button onclick="start()">Bắt đầu</button>

<h2>Người chơi</h2>

<div id="players"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

socket.on("updatePlayers",(players)=>{

let html=""

players.forEach(p=>{
html+=`<div class="player">${p.name}</div>`
})

document.getElementById("players").innerHTML=html

})

function start(){
socket.emit("startGame")
}

</script>

</body>
</html>
