<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Host</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.panel{
background:#1e293b;
padding:30px;
border-radius:15px;
max-width:500px;
margin:auto;
}

.player{
background:#334155;
padding:10px;
margin:5px;
border-radius:8px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
margin-top:20px;
}

</style>

</head>

<body>

<div class="panel">

<h1>🎮 Host Game</h1>

<h2>Danh sách người chơi</h2>

<div id="players"></div>

<button onclick="start()">Bắt đầu game</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io()

socket.on("players",(players)=>{

const div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.className="player"

d.innerText=p.name

div.appendChild(d)

})

})

function start(){

socket.emit("start")

}

</script>

</body>
</html>
