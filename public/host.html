<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.player{
background:#1e293b;
padding:10px;
margin:5px;
border-radius:8px;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<h1>🎮 Host Game</h1>

<h2>Danh sách người chơi</h2>

<div id="players"></div>

<button onclick="start()">Bắt đầu</button>

<br><br>

<a href="/qr" target="_blank">📱 Hiện QR code</a>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io()

socket.on("players",(players)=>{

const div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.className="player"

d.innerText=p.name

div.appendChild(d)

})

})

function start(){

socket.emit("start")

}

</script>

</body>
</html>
