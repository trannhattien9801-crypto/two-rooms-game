<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

.player{
background:#1e293b;
padding:12px;
margin:6px;
border-radius:8px;
}

.roleBox{
background:#111827;
padding:15px;
margin:10px;
border-radius:10px;
}

.blue{
border-left:6px solid #3b82f6;
}

.red{
border-left:6px solid #ef4444;
}

button{

padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
transition:0.3s;

}

button:hover{
transform:scale(1.1);
}

.startAnim{

animation:startEffect 0.5s;

}

@keyframes startEffect{

0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}

}

</style>

</head>

<body>

<h1>🎮 Host Game</h1>

<h2>Danh sách người chơi</h2>

<div id="players"></div>

<br>

<button id="startBtn" onclick="start()">BẮT ĐẦU</button>

<br><br>

<div id="roles"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io()

socket.on("players",(players)=>{

const div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.className="player"

d.innerText=p.name

div.appendChild(d)

})

})

function start(){

const btn=document.getElementById("startBtn")

btn.classList.add("startAnim")

setTimeout(()=>{
btn.classList.remove("startAnim")
},500)

socket.emit("start")

}

socket.on("showRoles",(players)=>{

const div=document.getElementById("roles")

div.innerHTML="<h2>🎭 Vai trò người chơi</h2>"

players.forEach(p=>{

const box=document.createElement("div")

let color=""

if(p.role.includes("Đỏ") || p.role.includes("Bom"))
color="red"
else
color="blue"

box.className="roleBox "+color

box.innerHTML="<b>"+p.name+"</b><br>"+p.role

div.appendChild(box)

})

})

</script>

</body>
</html>
