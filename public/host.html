<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Host Panel</title>

<style>

body{
background:#0b0f2a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:30px;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
width:150px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4444;
color:white;
cursor:pointer;
margin-left:10px;
}

.player{

background:#101a45;
margin:10px auto;
padding:15px;
border-radius:12px;
width:300px;

}

.role{
margin-top:5px;
font-size:16px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>Host Panel</h1>

<div>

Số người chơi

<input id="playerCount" type="number" min="2" max="30" value="10">

<button onclick="startGame()">Bắt đầu</button>

</div>

<h2>Danh sách người chơi</h2>

<div id="players"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let currentPlayers = []

socket.on("updatePlayers",(players)=>{

currentPlayers = players

renderPlayers()

})

socket.on("gameStarted",(players)=>{

currentPlayers = players

renderPlayers()

})

function renderPlayers(){

let html=""

currentPlayers.forEach(p=>{

html+=`

<div class="player">

<div>${p.name}</div>

<div class="role">

${p.role ? "Vai trò: "+p.role : "Chưa chia vai"}

</div>

</div>

`

})

document.getElementById("players").innerHTML = html

}

function startGame(){

let count = document.getElementById("playerCount").value

socket.emit("startGame",count)

}

</script>

</body>

</html>
