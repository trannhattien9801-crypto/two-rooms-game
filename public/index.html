<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Two Rooms</title>

<style>

body{
margin:0;
background:#0b0f2a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding:30px;
}

.title{
font-size:32px;
font-weight:bold;
margin-top:20px;
}

input{
width:80%;
padding:15px;
font-size:18px;
border-radius:12px;
border:none;
margin-top:20px;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:15px;
background:#00c3ff;
color:white;
cursor:pointer;
transition:0.2s;
}

button:active{
transform:scale(0.95);
}

.roleCard{

margin-top:40px;
padding:30px;
border-radius:25px;

background:linear-gradient(145deg,#121a44,#1e2a70);

box-shadow:
0 0 25px rgba(0,0,0,0.5);

}

.roleCard img{
width:180px;
margin-top:20px;
}

.roleName{
font-size:34px;
font-weight:bold;
margin-top:10px;
}

.roleDesc{
margin-top:15px;
font-size:18px;
opacity:0.9;
}

.waiting{
font-size:20px;
margin-top:40px;
}

</style>

</head>

<body>

<div class="container">

<div class="title">Two Rooms</div>

<div id="join">

<input id="name" placeholder="Nhập tên của bạn">

<br>

<button onclick="join()">Tham Gia</button>

</div>

<div id="game"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

let name = document.getElementById("name").value

if(name===""){
alert("Nhập tên trước!")
return
}

socket.emit("join",name)

document.getElementById("join").innerHTML=""

document.getElementById("game").innerHTML=
`<div class="waiting">Đang chờ host bắt đầu game...</div>`

}

const descriptions = {

tongthong:"Bạn là mục tiêu của Bomber. Hãy sống sót.",
boom:"Chạm vào Tổng Thống để đội Đỏ thắng.",
bacsi:"Bạn có thể bảo vệ người chơi quan trọng.",
vesi:"Bảo vệ Tổng Thống khỏi Bomber.",
thamtu:"Điều tra người chơi khác.",
phongvien:"Công bố thông tin để giúp đội mình.",
luatsu:"Bảo vệ người bị nghi ngờ.",
kysu:"Kiểm tra thiết bị và bom.",
giandiep:"Giả làm đội Xanh.",
satthu:"Loại bỏ mục tiêu.",
bantia:"Tấn công từ xa.",
keluadao:"Gây nhiễu thông tin.",
kephahoai:"Phá kế hoạch đội Xanh.",
nhatientri:"Biết trước thông tin.",
bansao:"Sao chép vai trò người khác.",
conbac:"Thắng nếu đoán đúng đội thắng.",
nguoicam:"Bạn không được nói.",
doido:"Thành viên đội Đỏ.",
doixanh:"Thành viên đội Xanh."

}

socket.on("yourRole",(role)=>{

document.getElementById("game").innerHTML=`

<div class="roleCard">

<div class="roleName">${role.toUpperCase()}</div>

<img src="/images/${role}.png">

<div class="roleDesc">${descriptions[role] || ""}</div>

</div>

`

})

</script>

</body>
</html>
