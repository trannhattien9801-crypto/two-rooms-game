<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Two Rooms</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.joinCard{
background:#1e293b;
padding:25px;
border-radius:15px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
background:#3b82f6;
color:white;
}

.roleCard{
display:none;
margin-top:30px;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}

.team{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.role{
font-size:26px;
margin-top:5px;
}

.desc{
margin-top:15px;
font-size:16px;
line-height:1.4;
}

.blue{
background:linear-gradient(135deg,#1d4ed8,#38bdf8);
}

.red{
background:linear-gradient(135deg,#991b1b,#ef4444);
}

.special{
background:linear-gradient(135deg,#92400e,#facc15);
}

</style>

</head>

<body>

<div class="container">

<div id="joinCard" class="joinCard">

<h2>🎮 Two Rooms</h2>

<p>Nhập tên của bạn</p>

<input id="name" placeholder="Tên người chơi">

<br>

<button onclick="join()">Tham gia</button>

<p id="status"></p>

</div>

<div id="roleCard" class="roleCard">

<div id="team" class="team"></div>
<div id="role" class="role"></div>
<div id="desc" class="desc"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

const name=document.getElementById("name").value

socket.emit("join",name)

document.getElementById("status").innerText="Đang chờ host bắt đầu..."

}

socket.on("role",(role)=>{

document.getElementById("joinCard").style.display="none"

const card=document.getElementById("roleCard")
card.style.display="block"

let team=""
let desc=""

if(role==="Đội Xanh"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn là dân thường đội Xanh."
}

else if(role==="Đội Đỏ"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn là dân thường đội Đỏ."
}

else if(role==="Tổng Thống"){
card.className="roleCard special"
team="👑 ĐỘI XANH"
desc="Nếu Bomber chạm bạn thì phe Đỏ thắng."
}

else if(role==="Kẻ Đặt Bom"){
card.className="roleCard special"
team="💣 ĐỘI ĐỎ"
desc="Nếu bạn chạm Tổng Thống thì phe Đỏ thắng."
}

else if(role==="Bác Sĩ"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn có thể bảo vệ người chơi quan trọng."
}

else if(role==="Kỹ Sư"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn có thể kiểm tra thiết bị."
}

else if(role==="Vệ Sĩ"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn bảo vệ Tổng Thống."
}

else if(role==="Thám Tử"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn có thể điều tra người chơi."
}

else if(role==="Phóng Viên"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn thu thập thông tin."
}

else if(role==="Luật Sư"){
card.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn bảo vệ người bị nghi ngờ."
}

else if(role==="Gián Điệp"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn biết thông tin đội Xanh."
}

else if(role==="Sát Thủ"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn có thể loại người chơi."
}

else if(role==="Bắn Tỉa"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn có thể hạ mục tiêu."
}

else if(role==="Kẻ Lừa Đảo"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn gây nhiễu thông tin."
}

else if(role==="Kẻ Phá Hoại"){
card.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn phá kế hoạch của đội Xanh."
}

else if(role==="Con Bạc"){
card.className="roleCard special"
team="🎲 TRUNG LẬP"
desc="Bạn thắng nếu đoán đúng đội thắng."
}

else if(role==="Nhà Đàm Phán"){
card.className="roleCard special"
team="🤝 TRUNG LẬP"
desc="Bạn có thể trao đổi người giữa hai phòng."
}

else if(role==="Nhà Tiên Tri"){
card.className="roleCard special"
team="🔮 TRUNG LẬP"
desc="Bạn có thể nhìn trước thông tin."
}

else if(role==="Bản Sao"){
card.className="roleCard special"
team="🧬 TRUNG LẬP"
desc="Bạn sao chép vai trò người khác."
}

else if(role==="Người Câm Xanh"){
card.className="roleCard blue"
team="🤐 ĐỘI XANH"
desc="Bạn không được phép nói."
}

else if(role==="Người Câm Đỏ"){
card.className="roleCard red"
team="🤐 ĐỘI ĐỎ"
desc="Bạn không được phép nói."
}

document.getElementById("team").innerText=team
document.getElementById("role").innerText=role
document.getElementById("desc").innerText=desc

})

</script>

</body>
</html>
