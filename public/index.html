<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Two Rooms</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.joinCard{
background:#1e293b;
padding:25px;
border-radius:15px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
margin-top:10px;
}

button{
padding:14px 24px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
background:#3b82f6;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
background:#2563eb;
}

.joinAnim{
animation:joinEffect 0.4s;
background:#22c55e !important;
}

@keyframes joinEffect{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.lobby{
display:none;
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:15px;
}

.player{
background:#0f172a;
padding:10px;
margin:5px;
border-radius:8px;
}

.card{
display:none;
margin-top:30px;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}

.blue{
background:linear-gradient(135deg,#1d4ed8,#38bdf8);
}

.red{
background:linear-gradient(135deg,#991b1b,#ef4444);
}

.special{
background:linear-gradient(135deg,#92400e,#facc15);
}

.team{
font-size:26px;
font-weight:bold;
}

.role{
font-size:28px;
margin-top:10px;
}

.desc{
margin-top:15px;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div id="joinCard" class="joinCard">

<h2>🎮 Two Rooms</h2>

<p>Nhập tên của bạn</p>

<input id="name" placeholder="Tên người chơi">

<br>

<button id="joinBtn" onclick="join()">Tham gia</button>

</div>

<div id="lobby" class="lobby">

<h3>👥 Lobby</h3>

<p>Đang chờ host bắt đầu...</p>

<div id="players"></div>

</div>

<div id="roleCard" class="card">

<div class="team" id="team"></div>
<div class="role" id="role"></div>
<div class="desc" id="desc"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

const name=document.getElementById("name").value

if(name.trim()==""){
alert("Nhập tên trước")
return
}

const btn=document.getElementById("joinBtn")

btn.classList.add("joinAnim")
btn.innerText="Đang tham gia..."

socket.emit("join",name)

document.getElementById("joinCard").style.display="none"
document.getElementById("lobby").style.display="block"

}

socket.on("players",(players)=>{

const div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.className="player"
d.innerText=p.name

div.appendChild(d)

})

})

socket.on("role",(role)=>{

document.getElementById("lobby").style.display="none"

const card=document.getElementById("roleCard")

card.style.display="block"

let team=""
let desc=""
let color=""

if(role==="Đội Xanh"){

team="🔵 ĐỘI XANH"
desc="Bạn là dân thường đội xanh."
color="blue"

}

else if(role==="Đội Đỏ"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn là dân thường đội đỏ."
color="red"

}

else if(role==="Tổng Thống"){

team="👑 ĐỘI XANH"
desc="Nếu Bomber chạm bạn thì đội đỏ thắng."
color="special"

}

else if(role==="Kẻ Đặt Bom"){

team="💣 ĐỘI ĐỎ"
desc="Chạm Tổng Thống để giúp đội đỏ thắng."
color="special"

}

else if(role==="Bác Sĩ"){

team="🔵 ĐỘI XANH"
desc="Bạn có thể bảo vệ Tổng Thống."
color="blue"

}

else if(role==="Kỹ Sư"){

team="🔵 ĐỘI XANH"
desc="Bạn có thể kiểm tra thiết bị."
color="blue"

}

else if(role==="Vệ Sĩ"){

team="🔵 ĐỘI XANH"
desc="Bạn bảo vệ Tổng Thống."
color="blue"

}

else if(role==="Thám Tử"){

team="🔵 ĐỘI XANH"
desc="Bạn có thể hỏi một người về đội của họ."
color="blue"

}

else if(role==="Phóng Viên"){

team="🔵 ĐỘI XANH"
desc="Bạn có thể công bố thông tin."
color="blue"

}

else if(role==="Luật Sư"){

team="🔵 ĐỘI XANH"
desc="Bạn bảo vệ người bị nghi ngờ."
color="blue"

}

else if(role==="Gián Điệp"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn giả làm đội xanh để thu thập thông tin."
color="red"

}

else if(role==="Sát Thủ"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn có thể loại mục tiêu."
color="red"

}

else if(role==="Bắn Tỉa"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn có thể hạ mục tiêu từ xa."
color="red"

}

else if(role==="Kẻ Lừa Đảo"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn gây nhiễu thông tin."
color="red"

}

else if(role==="Kẻ Phá Hoại"){

team="🔴 ĐỘI ĐỎ"
desc="Bạn phá kế hoạch đội xanh."
color="red"

}

else if(role==="Con Bạc"){

team="🎲 TRUNG LẬP"
desc="Bạn thắng nếu đoán đúng đội thắng."
color="special"

}

else if(role==="Nhà Đàm Phán"){

team="🤝 TRUNG LẬP"
desc="Bạn có thể trao đổi người giữa hai phòng."
color="special"

}

else if(role==="Nhà Tiên Tri"){

team="🔮 TRUNG LẬP"
desc="Bạn nhìn thấy thông tin trước."
color="special"

}

else if(role==="Bản Sao"){

team="🧬 TRUNG LẬP"
desc="Bạn sao chép vai trò người khác."
color="special"

}

else if(role==="Người Câm Xanh"){

team="🤐 ĐỘI XANH"
desc="Bạn không được nói."
color="blue"

}

else if(role==="Người Câm Đỏ"){

team="🤐 ĐỘI ĐỎ"
desc="Bạn không được nói."
color="red"

}

card.className="card "+color

document.getElementById("team").innerText=team
document.getElementById("role").innerText=role
document.getElementById("desc").innerText=desc

})

</script>

</body>

</html>
