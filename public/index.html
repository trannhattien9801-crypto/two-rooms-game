<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Two Rooms</title>

<style>

body{
margin:0;
background:#0b0f2a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding:30px;
}

input{
width:80%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:12px;
background:#00c3ff;
color:white;
margin-top:15px;
cursor:pointer;
}

.roleCard{

margin-top:40px;

background:linear-gradient(145deg,#101a45,#1e2a70);

padding:30px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,0.5);

}

.roleCard img{
width:200px;
margin-top:20px;
}

.roleName{
font-size:32px;
font-weight:bold;
}

.roleDesc{
margin-top:10px;
font-size:18px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Two Rooms</h1>

<div id="join">

<input id="name" placeholder="Nhập tên của bạn">

<br><br>

<button onclick="join()">Tham Gia</button>

</div>

<div id="game"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

let name = document.getElementById("name").value

if(name===""){
alert("Nhập tên trước!")
return
}

socket.emit("join",name)

document.getElementById("join").innerHTML="Đang chờ host bắt đầu..."

}

const roleNames={

tongthong:"Tổng Thống",
boom:"Bomber",
bacsi:"Bác Sĩ",
vesi:"Vệ Sĩ",
thamtu:"Thám Tử",
phongvien:"Phóng Viên",
luatsu:"Luật Sư",
kysu:"Kỹ Sư",
giandiep:"Gián Điệp",
satthu:"Sát Thủ",
bantia:"Bắn Tỉa",
keluadao:"Kẻ Lừa Đảo",
kephahoai:"Kẻ Phá Hoại",
nhatientri:"Nhà Tiên Tri",
bansao:"Bản Sao",
conbac:"Con Bạc",
camdo:"Câm Đỏ",
camxanh:"Câm Xanh",
doido:"Đội Đỏ",
doixanh:"Đội Xanh"

}

const descriptions={

tongthong:"Bạn là mục tiêu của Bomber.",
boom:"Chạm vào Tổng Thống để đội Đỏ thắng.",
bacsi:"Bạn có thể bảo vệ người chơi.",
vesi:"Bảo vệ Tổng Thống.",
thamtu:"Điều tra người chơi khác.",
phongvien:"Công bố thông tin.",
luatsu:"Bảo vệ người bị nghi.",
kysu:"Kiểm tra thiết bị.",
giandiep:"Giả làm đội Xanh để thu thập thông tin.",
satthu:"Loại bỏ mục tiêu.",
bantia:"Tấn công từ xa.",
keluadao:"Gây nhiễu thông tin.",
kephahoai:"Phá kế hoạch đội Xanh.",
nhatientri:"Biết trước thông tin.",
bansao:"Sao chép vai trò.",
conbac:"Đoán đội thắng.",
camdo:"Bạn thuộc đội Đỏ và không được nói.",
camxanh:"Bạn thuộc đội Xanh và không được nói.",
doido:"Bạn thuộc đội Đỏ.",
doixanh:"Bạn thuộc đội Xanh."

}

socket.on("yourRole",(role)=>{

document.getElementById("game").innerHTML=`

<div class="roleCard">

<div class="roleName">${roleNames[role]}</div>

<img src="/images/${role}.png">

<div class="roleDesc">${descriptions[role]}</div>

</div>

`

})

</script>

</body>
</html>
