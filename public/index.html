<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Host Panel</title>

<style>

body{
background:#0b0f2a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:30px;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
width:100px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4444;
color:white;
cursor:pointer;
margin-left:10px;
}

.player{
background:#101a45;
margin:10px auto;
padding:15px;
border-radius:12px;
width:300px;
}

</style>

</head>

<body>

<div class="container">

<h1>Host Panel</h1>

<div>

Số người chơi

<input id="playerCount" type="number" value="10">

<button onclick="startGame()">Bắt đầu</button>

</div>

<h2>Người chơi</h2>

<div id="players"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let currentPlayers=[]

socket.on("updatePlayers",(players)=>{

currentPlayers=players

renderPlayers()

})

socket.on("gameStarted",(players)=>{

currentPlayers=players

renderPlayers()

})

function renderPlayers(){

let html=""

currentPlayers.forEach(p=>{

html+=`

<div class="player">

<div>${p.name}</div>

<div>${p.role ? "Vai trò: "+p.role : "Chưa chia vai"}</div>

</div>

`

})

document.getElementById("players").innerHTML=html

}

function startGame(){

let count=document.getElementById("playerCount").value

socket.emit("startGame",count)

}

</script>

</body>
</html>
