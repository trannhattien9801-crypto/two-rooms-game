<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Two Rooms</title>

<style>

body{
margin:0;
background:#0b0f2a;
color:white;
font-family:Arial;
text-align:center;
}

.container{
padding:30px;
}

input{
width:80%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:15px 40px;
font-size:18px;
border:none;
border-radius:12px;
background:#00c3ff;
color:white;
margin-top:15px;
cursor:pointer;
}

.roleCard{

margin-top:40px;

background:linear-gradient(145deg,#101a45,#1e2a70);

padding:30px;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,0.5);

}

.roleCard img{
width:200px;
margin-top:20px;
}

.roleName{
font-size:32px;
font-weight:bold;
}

.roleDesc{
margin-top:10px;
font-size:18px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Two Rooms</h1>

<div id="join">

<input id="name" placeholder="Nhập tên của bạn">

<br><br>

<button onclick="join()">Tham Gia</button>

</div>

<div id="game"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

let name = document.getElementById("name").value

if(name===""){
alert("Nhập tên trước!")
return
}

socket.emit("join",name)

document.getElementById("join").innerHTML="Đang chờ host bắt đầu..."

}

const roleNames={

tongthong:"Tổng Thống(Phe Xanh)",
boom:"Bomber(Phe Đỏ)",
bacsi:"Bác Sĩ(Phe Xanh)",
vesi:"Vệ Sĩ(Phe Xanh)",
thamtu:"Thám Tử(Phe Xanh)",
phongvien:"Phóng Viên(Phe Trung Lập)",
luatsu:"Luật Sư(Phe Xanh)",
kysu:"Kỹ Sư(Phe Xanh)",
giandiep:"Gián Điệp(Phe Đỏ)",
satthu:"Sát Thủ(Phe Đỏ)",
bantia:"Bắn Tỉa(Phe Xanh)",
keluadao:"Kẻ Lừa Đảo(Phe Đỏ)",
kephahoai:"Kẻ Phá Hoại(Phe Đỏ)",
nhatientri:"Nhà Tiên Tri(Phe Trung Lập)",
bansao:"Bản Sao(Phe Trung Lập)",
conbac:"Con Bạc(Phe Trung Lập)",
camdo:"Câm Đỏ(Phe Đỏ)",
camxanh:"Câm Xanh(Phe Xanh)",
doido:"Đội Đỏ(Phe Đỏ)",
doixanh:"Đội Xanh(Phe Xanh)"

}

const descriptions={

tongthong:"Bạn là mục tiêu của Bom,nếu Bom chung phòng thì đội đỏ thắng.",
boom:"Chung phòng với Tổng Thống để đội Đỏ thắng.",
bacsi:"Bạn có thể bảo vệ người chơi.",
vesi:"Bảo vệ Tổng Thống,nếu bạn chung phòng với Tổng Thống khi Bom nổ thì bom sẽ không nổ.",
thamtu:"Điều tra người chơi khác, bạn biết được họ là đội nào.",
phongvien:"Công bố thông tin,bạn có thể công bố thông tin từ quản trò đưa ra.",
luatsu:"Bảo vệ người bị nghi,bạn có thể bảo vệ một người chơi bị nghi ngờ.",
kysu:"Kiểm tra thiết bị, bạn có thể kiểm tra xem một người chơi có thiết bị nổ hay không.",
giandiep:"Giả làm đội Xanh để thu thập thông tin,bạn thắng khi đội đỏ thắng.",
satthu:"Loại bỏ mục tiêu, bạn có thể loại bỏ một người chơi bất kỳ.",
bantia:"Tấn công từ xa, bạn có thể tấn công một người chơi bất kỳ.",
keluadao:"Gây nhiễu thông tin, bạn có thể tráo đổi vai trò của 2 người chơi bất kỳ.",
kephahoai:"Phá kế hoạch đội Xanh, bạn thắng khi đội Xanh thua.",
nhatientri:"Biết trước thông tin, bạn có thể biết được vai trò của một người chơi bất kỳ.",
bansao:"Sao chép vai trò, bạn có thể sao chép vai trò của một người chơi bất kỳ, sau đó bạn sẽ có vai trò đó.",
conbac:"Đoán đội thắng, bạn có thể đoán đội nào sẽ thắng, nếu đoán đúng bạn thắng.",
camdo:"Bạn thuộc đội Đỏ và không được nói.",
camxanh:"Bạn thuộc đội Xanh và không được nói.",
doido:"Bạn thuộc đội Đỏ.",
doixanh:"Bạn thuộc đội Xanh.",
thietbino:"Bạn có thiết bị nổ, nếu chung phòng với Bom tịt thì bạn sẽ nổ cùng Bom tịt.",

}

socket.on("yourRole",(data)=>{

const role = data.role
const item = data.item

let itemHTML = ""

if(item==="thietbino"){
itemHTML = `
<br>
<img src="/images/thietbino.png" width="80">
<br>
<b>💣 Thiết bị nổ</b>
`
}

if(item==="thietbino"){
itemText = "<br><b>💣 Bạn có THIẾT BỊ NỔ</b>"
}

document.getElementById("game").innerHTML=`

<div class="roleCard">

<div class="roleName">${roleNames[role]}</div>

<img src="/images/${role}.png">

<div class="roleDesc">
${descriptions[role]}
${itemHTML}
</div>

</div>

`

})

</script>

</body>
</html>
