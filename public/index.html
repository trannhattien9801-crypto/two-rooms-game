<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Two Rooms</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
background:#3b82f6;
color:white;
}

.roleCard{
display:none;
margin-top:20px;
padding:25px;
border-radius:15px;
}

.team{
font-size:26px;
font-weight:bold;
}

.role{
font-size:22px;
margin-top:10px;
}

.desc{
margin-top:10px;
font-size:16px;
}

.blue{
background:#1e3a8a;
}

.red{
background:#7f1d1d;
}

.special{
background:#78350f;
}

</style>

</head>

<body>

<div class="container">

<div id="joinCard" class="card">

<h2>🎮 Two Rooms</h2>

<p>Nhập tên của bạn</p>

<input id="name" placeholder="Tên người chơi">

<br>

<button onclick="join()">Tham gia</button>

<p id="status"></p>

</div>

<div id="roleCard" class="roleCard">

<div class="team" id="team"></div>
<div class="role" id="role"></div>
<div class="desc" id="desc"></div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

const name=document.getElementById("name").value

socket.emit("join",name)

document.getElementById("status").innerText="Đang chờ host bắt đầu..."

}

socket.on("role",(role)=>{

document.getElementById("joinCard").style.display="none"

const roleCard=document.getElementById("roleCard")
roleCard.style.display="block"

let team=""
let desc=""

if(role==="Đội Xanh"){
roleCard.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn thuộc phe Xanh."
}

else if(role==="Đội Đỏ"){
roleCard.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn thuộc phe Đỏ."
}

else if(role==="Tổng Thống"){
roleCard.className="roleCard special"
team="👑 ĐỘI XANH"
desc="Nếu Bomber chạm bạn thì phe Đỏ thắng."
}

else if(role==="Kẻ Đặt Bom"){
roleCard.className="roleCard special"
team="💣 ĐỘI ĐỎ"
desc="Nếu bạn chạm Tổng Thống thì phe Đỏ thắng."
}

else if(role==="Người Câm Xanh"){
roleCard.className="roleCard blue"
team="🔵 ĐỘI XANH"
desc="Bạn không được nói trong suốt trò chơi."
}

else if(role==="Người Câm Đỏ"){
roleCard.className="roleCard red"
team="🔴 ĐỘI ĐỎ"
desc="Bạn không được nói trong suốt trò chơi."
}

else{
roleCard.className="roleCard special"
team="🎭 VAI ĐẶC BIỆT"
desc="Bạn có vai trò đặc biệt trong trò chơi."
}

document.getElementById("team").innerText=team
document.getElementById("role").innerText="Vai trò: "+role
document.getElementById("desc").innerText=desc

})

</script>

</body>
</html>
