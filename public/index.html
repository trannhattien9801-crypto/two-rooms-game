<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Two Rooms</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.joinCard{
background:#1e293b;
padding:25px;
border-radius:15px;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:80%;
margin-top:10px;
}

button{
padding:14px 24px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
background:#3b82f6;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.08);
background:#2563eb;
}

.joinAnim{
animation:joinEffect 0.4s;
background:#22c55e !important;
}

@keyframes joinEffect{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

.lobby{
display:none;
margin-top:25px;
background:#1e293b;
padding:20px;
border-radius:15px;
}

.player{
background:#0f172a;
padding:10px;
margin:5px;
border-radius:8px;
}

.cardContainer{
display:none;
margin-top:30px;
perspective:1000px;
}

.card{
width:100%;
height:220px;
position:relative;
transform-style:preserve-3d;
transition:transform 0.7s;
}

.card.flip{
transform:rotateY(180deg);
}

.cardFace{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
padding:25px;
}

.cardFront{
background:#1e293b;
}

.cardBack{
transform:rotateY(180deg);
}

.blue{
background:linear-gradient(135deg,#1d4ed8,#38bdf8);
}

.red{
background:linear-gradient(135deg,#991b1b,#ef4444);
}

.special{
background:linear-gradient(135deg,#92400e,#facc15);
}

.team{
font-size:26px;
font-weight:bold;
}

.role{
font-size:24px;
margin-top:10px;
}

.desc{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div id="joinCard" class="joinCard">

<h2>🎮 Two Rooms</h2>

<p>Nhập tên của bạn</p>

<input id="name" placeholder="Tên người chơi">

<br>

<button id="joinBtn" onclick="join()">Tham gia</button>

</div>

<div id="lobby" class="lobby">

<h3>👥 Lobby</h3>

<p>Đang chờ host bắt đầu...</p>

<div id="players"></div>

</div>

<div class="cardContainer" id="cardContainer">

<div class="card" id="card">

<div class="cardFace cardFront">

<h2>🎴 Vai trò</h2>
<p>Đang lật...</p>

</div>

<div class="cardFace cardBack" id="cardBack">

<div class="team" id="team"></div>
<div class="role" id="role"></div>
<div class="desc" id="desc"></div>

</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

function join(){

const name=document.getElementById("name").value

if(name.trim()==""){
alert("Nhập tên trước")
return
}

const btn=document.getElementById("joinBtn")

btn.classList.add("joinAnim")
btn.innerText="Đang tham gia..."

socket.emit("join",name)

document.getElementById("joinCard").style.display="none"
document.getElementById("lobby").style.display="block"

}

socket.on("players",(players)=>{

const div=document.getElementById("players")

div.innerHTML=""

players.forEach(p=>{

const d=document.createElement("div")

d.className="player"
d.innerText=p.name

div.appendChild(d)

})

})

socket.on("role",(role)=>{

document.getElementById("lobby").style.display="none"
document.getElementById("cardContainer").style.display="block"

const card=document.getElementById("card")
const back=document.getElementById("cardBack")

let team=""
let desc=""
let color=""

if(role==="Đội Xanh"){
team="🔵 ĐỘI XANH"
desc="Bạn là dân thường đội xanh"
color="blue"
}

else if(role==="Đội Đỏ"){
team="🔴 ĐỘI ĐỎ"
desc="Bạn là dân thường đội đỏ"
color="red"
}

else if(role==="Tổng Thống"){
team="👑 ĐỘI XANH"
desc="Bomber chạm bạn → đội đỏ thắng"
color="special"
}

else if(role==="Kẻ Đặt Bom"){
team="💣 ĐỘI ĐỎ"
desc="Chạm Tổng Thống để thắng"
color="special"
}

else if(role==="Người Câm Xanh"){
team="🤐 ĐỘI XANH"
desc="Bạn không được nói"
color="blue"
}

else if(role==="Người Câm Đỏ"){
team="🤐 ĐỘI ĐỎ"
desc="Bạn không được nói"
color="red"
}

back.className="cardFace cardBack "+color

document.getElementById("team").innerText=team
document.getElementById("role").innerText=role
document.getElementById("desc").innerText=desc

setTimeout(()=>{
card.classList.add("flip")
},500)

})

</script>

</body>

</html>
